<!DOCTYPE html>
<html>
<head>
  <title>Get Location</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #1a1a2e; color: #fff; }
    #result { font-size: 24px; margin-top: 20px; padding: 20px; background: #16213e; border-radius: 8px; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 8px; }
    button:hover { background: #ff6b6b; }
  </style>
</head>
<body>
  <h1>Récupérer ta position</h1>
  <button onclick="getLocation()">Obtenir ma position</button>
  <div id="result"></div>

  <script>
    function getLocation() {
      if (navigator.geolocation) {
        document.getElementById('result').innerHTML = 'Chargement...';
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            document.getElementById('result').innerHTML = `
              <strong>Latitude:</strong> ${lat}<br>
              <strong>Longitude:</strong> ${lng}<br><br>
              <strong>Copie ça:</strong><br>
              <code style="background:#0f3460;padding:10px;display:block;margin-top:10px;border-radius:4px;">
                ${lat}, ${lng}
              </code>
            `;
          },
          (error) => {
            document.getElementById('result').innerHTML = 'Erreur: ' + error.message;
          }
        );
      } else {
        document.getElementById('result').innerHTML = 'Géolocalisation non supportée';
      }
    }
  </script>
</body>
</html>
