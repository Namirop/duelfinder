name: tcg_matchmaker
description: Application de mise en relation de joueurs de TCG
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^7.0.0

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  mapbox_maps_flutter: ^2.18.0

  # Firebase
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.0.0

  # Fonts
  google_fonts: ^6.2.1

  # HTTP
  http: ^1.2.1

  # Image
  image_picker: ^1.1.2

  # Env
  flutter_dotenv: ^5.2.1

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_secure_storage: ^10.0.0
  logger: ^2.6.2
  animated_toggle_switch: ^0.8.7
  intl: ^0.20.2
  soft_edge_blur: ^0.1.3
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

# Icons Android gérés manuellement via easyappicon (app/android/app/src/main/res/)
# Ne pas relancer flutter pub run flutter_launcher_icons pour Android
flutter_launcher_icons:
  android: false
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
